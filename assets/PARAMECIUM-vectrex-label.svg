<?xml version="1.0" encoding="UTF-8"?>
<!--
  PARAMECIUM — Vectrex silver cassette face label (homebrew)
  Print size: 61mm × 43mm (landscape).
  US GCE layout: Vectrex ? ARCADE SYSTEM CARTRIDGE ? title ? GCE ? copyright.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="61mm" height="43mm" viewBox="0 0 610 430">
  <defs>
    <pattern id="grid" width="10" height="10" patternUnits="userSpaceOnUse">
      <rect width="10" height="10" fill="#cfcfcf"/>
      <path d="M10 0H0V10" fill="none" stroke="#a8a8a8" stroke-width="0.6"/>
    </pattern>
    <linearGradient id="titleFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2ee6ff"/>
      <stop offset="50%" stop-color="#4dff88"/>
      <stop offset="100%" stop-color="#ff4ad4"/>
    </linearGradient>
  </defs>

  <rect x="2" y="2" width="606" height="426" rx="18" ry="18" fill="url(#grid)" stroke="#888" stroke-width="2"/>

  <!-- Vectrex wordmark (US GCE solid black treatment) -->
  <g transform="translate(305,52)" text-anchor="middle">
    <rect x="-175" y="-14" width="48" height="6" fill="#111"/>
    <text font-family="Arial Black, Helvetica, Arial, sans-serif" font-size="42"
          font-style="italic" font-weight="900" fill="#111" letter-spacing="-1">Vectrex</text>
  </g>

  <text x="305" y="88" text-anchor="middle"
        font-family="Helvetica, Arial, sans-serif" font-size="13"
        font-weight="700" fill="#111" letter-spacing="2.2">ARCADE SYSTEM CARTRIDGE</text>

  <g fill="none" stroke="#333" stroke-width="2" opacity="0.4" transform="translate(305,135)">
    <circle cx="-90" cy="0" r="14"/>
    <circle cx="-45" cy="-6" r="10"/>
    <path d="M-76,-3 L-55,-7"/>
    <ellipse cx="95" cy="-4" rx="15" ry="8" transform="rotate(20 95 -4)"/>
  </g>

  <g transform="translate(305,220)">
    <rect x="-250" y="-42" width="500" height="84" rx="12" ry="12"
          fill="#111" opacity="0.07" stroke="#111" stroke-width="3"/>
    <text y="8" text-anchor="middle"
          font-family="Arial Black, Impact, Helvetica, sans-serif"
          font-size="46" font-weight="900" fill="url(#titleFill)"
          stroke="#111" stroke-width="3.5" paint-order="stroke fill"
          letter-spacing="2">PARAMECIUM</text>
  </g>

  <!-- Vintage GCE wordmark (wide block sans, as on original US labels) -->
  <text x="305" y="325" text-anchor="middle"
        font-family="Arial Black, Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="48" font-weight="900" fill="#111" letter-spacing="10">GCE</text>

  <text x="305" y="390" text-anchor="middle"
        font-family="Helvetica, Arial, sans-serif" font-size="12"
        fill="#222">© 2026 BRIAN JONES. All Rights Reserved.</text>
</svg>
